services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assay
      POSTGRES_PASSWORD: assay
      POSTGRES_DB: assay
    ports:
      - "5432:5432"
    volumes:
      - assay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assay -d assay"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  assay_postgres_data:
